version: 2

updates:
  # Root workspace (covers shared devDependencies)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: friday
    labels:
      - dependencies
    groups:
      npm-root:
        patterns: ["*"]
    ignore:
      - dependency-name: "zod"
        versions: [">=4.0.0"]  # Incompatible with @modelcontextprotocol/sdk (Zod 3 APIs)

  # packages/core — BookStack API client
  - package-ecosystem: npm
    directory: /packages/core
    schedule:
      interval: weekly
      day: friday
    labels:
      - dependencies
    groups:
      npm-core:
        patterns: ["*"]

  # packages/stdio — MCP stdio server (published package)
  - package-ecosystem: npm
    directory: /packages/stdio
    schedule:
      interval: weekly
      day: friday
    labels:
      - dependencies
    groups:
      npm-stdio:
        patterns: ["*"]
    ignore:
      - dependency-name: "zod"
        versions: [">=4.0.0"]  # Incompatible with @modelcontextprotocol/sdk (Zod 3 APIs)

  # GitHub Actions — keep action versions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: friday
    labels:
      - dependencies
    groups:
      docker:
        patterns: ["*"]
